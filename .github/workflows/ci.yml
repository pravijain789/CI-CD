name: Advanced CI Pipeline

on:
  pull_request:
    branches: [ "main" ]

jobs:
  lint-code:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Download code
        uses: actions/checkout@v4
      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: 📦 Install dependencies
        run: npm ci
      - name: 🧹 Run ESLint
        run: npm run lint

  run-tests:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Download code
        uses: actions/checkout@v4
      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: 📦 Install dependencies
        run: npm ci
      - name: 🧪 Run Jest Tests
        run: npm run test

  build-project:
    runs-on: ubuntu-latest
    needs: [lint-code, run-tests] 
    
    steps:
      - name: 📥 Download code
        uses: actions/checkout@v4
      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: 🏗️ Run Build Command
        run: npm run build